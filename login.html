<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Drone Defence System</title>
  <meta name="description" content="Admin and viewer authentication for Drone Defence System.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
  <div class="app-shell auth-shell">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <header class="topbar landing-topbar">
      <div>
        <p class="eyebrow">Secure Access Gateway</p>
        <h1>Drone Defence Login</h1>
      </div>
      <div class="topbar-actions">
        <a class="ghost-button button-link" href="index.html">Home</a>
      </div>
    </header>

    <main class="auth-main">
      <section class="card auth-card">
        <div class="auth-head">
          <h2 class="auth-title">Choose your access role</h2>
          <p class="muted">Admins control the full system. Viewers can monitor live defence telemetry in read-only mode.</p>
        </div>

        <div class="auth-tabs" role="tablist" aria-label="Login roles">
          <button id="adminTab" class="ghost-button auth-tab active" type="button" data-role="admin">Admin</button>
          <button id="viewerTab" class="ghost-button auth-tab" type="button" data-role="viewer">Viewer</button>
        </div>

        <form id="loginForm" class="auth-form">
          <input id="loginRole" type="hidden" value="admin">
          <label class="auth-field">
            <span>Email</span>
            <input id="emailInput" type="email" placeholder="admin@dds.local" required>
          </label>
          <label class="auth-field">
            <span>Password</span>
            <input id="passwordInput" type="password" placeholder="Enter password" required>
          </label>
          <button class="primary-button" type="submit">Continue</button>
          <p id="loginHint" class="muted auth-hint"></p>
          <p id="loginError" class="auth-error hidden"></p>
        </form>
      </section>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
